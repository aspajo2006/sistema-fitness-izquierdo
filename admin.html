<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | I.E. Francisco Izquierdo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 2px solid var(--primary);
            background: rgba(0,0,0,0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            color: var(--primary);
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            padding: 7px 16px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-logout:hover { border-color: var(--primary); color: var(--text); }

        .admin-container {
            width: 95%;
            max-width: 1000px;
            margin: 40px auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .stat-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-card .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: #aaa;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        .search-bar {
            width: 100%;
            padding: 11px 16px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 8px;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-bar:focus { border-color: var(--primary); }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        .users-table thead tr {
            border-bottom: 2px solid var(--primary);
        }
        .users-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #888;
            font-weight: 600;
        }
        .users-table tbody tr {
            border-bottom: 1px solid #222;
            transition: background 0.15s;
        }
        .users-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .users-table td {
            padding: 14px 16px;
            color: var(--text);
        }
        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            margin-right: 10px;
            vertical-align: middle;
            flex-shrink: 0;
        }
        .rank-badge {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .rank-0 { background: rgba(255,255,255,0.08); color: #aaa; }
        .rank-1 { background: rgba(33,150,243,0.15); color: #64b5f6; }
        .rank-2 { background: rgba(156,39,176,0.15); color: #ce93d8; }
        .rank-3 { background: rgba(255,152,0,0.15); color: #ffb74d; }
        .rank-4 { background: rgba(230,57,70,0.2); color: #ef9a9a; }

        .xp-cell { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--primary); }
        .date-cell { color: #666; font-size: 0.8rem; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }
        .empty-state i { font-size: 2rem; margin-bottom: 12px; display: block; }

        .loading-row td {
            text-align: center;
            padding: 40px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="glow-bg" aria-hidden="true"></div>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <header class="admin-header">
        <div class="admin-title">⚡ PANEL ADMINISTRADOR</div>
        <div style="display:flex; gap:12px; align-items:center;">
            <span id="admin-name" style="font-size:0.8rem; color:#888;"></span>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <div class="admin-container">
        <!-- Estadísticas generales -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-num" id="stat-total">—</div>
                <div class="stat-label">USUARIOS TOTALES</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-active">—</div>
                <div class="stat-label">CON XP > 0</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-avg">—</div>
                <div class="stat-label">XP PROMEDIO</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="stat-top">—</div>
                <div class="stat-label">XP MÁS ALTO</div>
            </div>
        </div>

        <!-- Tabla de usuarios -->
        <p class="section-title">USUARIOS REGISTRADOS</p>
        <input
            type="search"
            class="search-bar"
            id="search-input"
            placeholder="Buscar por nombre o email..."
            oninput="filterUsers()"
        >

        <table class="users-table" aria-label="Lista de usuarios">
            <thead>
                <tr>
                    <th>USUARIO</th>
                    <th>EMAIL</th>
                    <th>NIVEL</th>
                    <th>XP</th>
                    <th>REGISTRADO</th>
                </tr>
            </thead>
            <tbody id="users-tbody">
                <tr class="loading-row"><td colspan="5"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script>
        const NIVELES = ["INICIANTE","ESTUDIANTE ACTIVO","GUERRERO F.I.","ATLETA MORALINO","ELITE SALUDABLE"];

        let allUsers = [];

        function getRank(xp) {
            return Math.min(Math.floor(xp / 200), NIVELES.length - 1);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '—';
            return new Date(dateStr).toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' });
        }

        function initials(name) {
            if (!name) return '?';
            return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        }

        // Mostrar toast
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove('visible'), 3000);
        }

        async function init() {
            // Verificar sesión y que sea admin
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }

            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('is_admin, full_name')
                .eq('id', session.user.id)
                .single();

            if (!profile?.is_admin) {
                showToast('Acceso denegado.');
                setTimeout(() => window.location.href = 'index.html', 1500);
                return;
            }

            document.getElementById('admin-name').textContent = profile.full_name || session.user.email;
            loadUsers();
        }

        async function loadUsers() {
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .order('xp', { ascending: false });

            if (error) {
                document.getElementById('users-tbody').innerHTML =
                    '<tr class="loading-row"><td colspan="5">Error al cargar usuarios.</td></tr>';
                return;
            }

            allUsers = data || [];
            renderStats(allUsers);
            renderTable(allUsers);
        }

        function renderStats(users) {
            const withXP = users.filter(u => u.xp > 0);
            const avgXP  = users.length ? Math.round(users.reduce((s, u) => s + (u.xp || 0), 0) / users.length) : 0;
            const topXP  = users.length ? Math.max(...users.map(u => u.xp || 0)) : 0;

            document.getElementById('stat-total').textContent  = users.length;
            document.getElementById('stat-active').textContent = withXP.length;
            document.getElementById('stat-avg').textContent    = avgXP;
            document.getElementById('stat-top').textContent    = topXP;
        }

        function renderTable(users) {
            const tbody = document.getElementById('users-tbody');

            if (!users.length) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><i class="fas fa-users-slash"></i>No hay usuarios aún.</div></td></tr>';
                return;
            }

            tbody.innerHTML = users.map(u => {
                const rankIdx  = getRank(u.xp || 0);
                const rankName = NIVELES[rankIdx];
                return `
                <tr>
                    <td>
                        <span class="user-avatar">${initials(u.full_name)}</span>
                        ${u.full_name || 'Sin nombre'}
                    </td>
                    <td style="color:#aaa">${u.email || '—'}</td>
                    <td><span class="rank-badge rank-${rankIdx}">${rankName}</span></td>
                    <td class="xp-cell">${u.xp || 0} XP</td>
                    <td class="date-cell">${formatDate(u.created_at)}</td>
                </tr>`;
            }).join('');
        }

        function filterUsers() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allUsers.filter(u =>
                (u.full_name || '').toLowerCase().includes(q) ||
                (u.email || '').toLowerCase().includes(q)
            );
            renderTable(filtered);
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        init();
    </script>
</body>
</html>
